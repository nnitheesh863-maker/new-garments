version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: garment_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password

  backend:
    build: ./backend
    container_name: garment_backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/garment_production
      - JWT_SECRET=your_jwt_secret_key
      - NODE_ENV=production
    volumes:
      - ./backend:/app
    command: npm start

  frontend:
    image: nginx:alpine
    container_name: garment_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  mongodb_data:
